<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Analytics Dashboard</title>
    <link rel="stylesheet" href="css/analysis.css">
</head>
<body>
  <nav class="nav">
    
<button class="menu-toggle">☰</button>
    <div class="nav-menu">
      <img src="assets/logo.png" alt="Murdoch University" class="logo">
      <a href="#" onclick="history.back(); return false;">Dashboard</a>
      <a href="staffmerchandise.html">Merchandise</a>
      <a href="moderation.html">Moderation</a>
      <a href="#" class="active">Analysis</a>
    </div>
  </nav>

  <div class="main-header">
    <h1>Analysis</h1>
    <h2>Monitor poll results, student engagement, and performance metrics</h2>
  </div>

  <hr class="dashboard-line">

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('polls')">Poll Analytics</button>
            <button class="tab" onclick="switchTab('students')">Student Spotlight Analytics</button>
        </div>

        <!-- Poll Analytics Content -->
        <div id="polls-content" class="content active">
            <div class="sidebar">
                <div class="search-box">
                    <span></span>
                    <input type="text" placeholder="Search poll by title..." id="searchInput" onkeyup="filterPolls()">
                </div>
                <div class="poll-list" id="pollList"></div>
            </div>
            <div class="main-content" id="pollDetails"></div>
        </div>

        <!-- Student Spotlight Content -->
        <div id="students-content" class="content">
            <div class="spotlight-sidebar">
                <select class="filter-select" id="monthFilter" onchange="filterStudents()">
                    <option value="">All Months</option>
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March">March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                    <option value="June">June</option> 
                    <option value="July">July</option>
                    <option value="August">August</option>
                    <option value="September">September</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>
                <select class="filter-select" id="yearFilter" onchange="filterStudents()">
                    <option value="">All Years</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                </select>
                <div class="poll-list" id="studentList"></div>
            </div>
            <div class="main-content" id="studentDetails"></div>
        </div>
    </div>

  <!-- ✅ Footer -->
  <footer class="footer">
    <div class="footer-right">
      <img src="assets/crest.png" alt="Murdoch Crest" class="crest">
      <span>
        © 2025 MUSEngage | Developed by Team 2 | Programming / Security Team: Chun Meng, Claire, Dominic |
        AI: Tuan An | Project Manager: Rafael, Wee Shen
      </span>
    </div>
  </footer>

  <!-- ✅ FAQ Button -->
  <div class="faq-container">
    <div class="faq-label">FAQ</div>
    <a href="faq.html">
      <button class="faq-button" type="button">
        <div class="question-mark">?</div>
      </button>
    </a>
  </div>

    <script src="js/analysis.js"> </script>
    
  <script>
document.addEventListener("DOMContentLoaded", () => {
  const menuToggle = document.querySelector(".menu-toggle");
  const nav = document.querySelector(".nav");

  menuToggle.addEventListener("click", () => {
    nav.classList.toggle("active");
  });
});
</script>


    </body>
</html>
