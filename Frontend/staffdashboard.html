<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Staff Dashboard — Murdoch</title>
  <link rel="stylesheet" href="staffdashboard.css">
</head>

<body>
  <nav class="nav">
    <div class="nav-menu">
      <img src="assets/logo.png" alt="Murdoch University" class="logo">
      <a href="#">Dashboard</a>
      <a href="adminmerchandise.html">Merchandise</a>
      <a href="community.html">Moderation</a>
      <a href="Analysis.html">Analysis</a>
    </div>
  </nav>

  <div class="main-header">
    <h1>Staff Dashboard</h1>
    <h2>Welcome back, <span id="staffName">Staff Member</span></h2>
  </div>

  <hr class="dashboard-line">

  <!-- Two-column layout -->
  <div class="dashboard-grid">
    <!-- Left: Manage Polls -->
    <section class="poll-section">
      <div class="header-flex">
        <h2>Manage Polls</h2>
      </div>

      <div class="poll-container" id="pollContainer">
        <!-- Poll cards dynamically inserted here -->
      </div>
    </section>

    <!-- Right: Manage Competitions -->
    <section class="competition-section">
      <div class="header-flex">
        <h2>Manage Competitions</h2>
        <button class="add-btn">+</button>
      </div>

      <div class="competition-container" id="competitionContainer">
        <!-- Competition cards dynamically inserted here -->
      </div>
    </section>
  </div>

  <script src="staffdashboard.js"></script>
</body>
</html>
