<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scan QR — Murdoch Engage</title>

  <style>
    :root {
      --accent: #A12262;
      --grad: linear-gradient(90deg,#65135D 0%,#A12262 25%,#E12744 50%,#B72A4C 75%,#F25C19 100%);
      --pill: rgba(255,255,255,0.16);
      --radius: 14px;
      --shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #65135D 0%, #A12262 25%, #E12744 50%, #B72A70 75%, #C74287 100%);
      font-family: 'Inter', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }



    /* Wrapper center layout */
    .scanner-container {
      text-align: center;
      color: #fff;
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 18px;
      left: 18px;
      background: var(--pill);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.4);
      padding: 10px 18px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(4px);
      transition: .25s ease;
    }
    .back-btn:hover {
      background: var(--grad);
      border-color: transparent;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 22px;
      letter-spacing: 0.5px;
    }

    #qr-wrapper {

      padding: 18px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin: auto;
      width: fit-content;
    }

    #qr-reader {
      border-radius: var(--radius);
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Back Button -->
  <button class="back-btn" onclick="window.location.href='studentdashboard.html'">← Back</button>

  <!-- Centered UI Content -->
  <div class="scanner-container">
    <div class="title">Scan QR Code</div>
    
    <div id="qr-wrapper">
      <div id="qr-reader" style="width:300px;height:300px;"></div>
    </div>
  </div>

 <script src="https://unpkg.com/html5-qrcode"></script>
<script>
const API_BASE_URL = "http://localhost:3000"; // backend URL
const scanner = new Html5Qrcode("qr-reader");

// Fetch all competitions from dashboard
async function loadCompetitions() {
  try {
    const response = await fetch(`${API_BASE_URL}/api/dashboard`, {
      method: "GET",
      // credentials: "include" // uncomment if using cookies/session
    });

    if (!response.ok) throw new Error("Failed to fetch competitions");

    const data = await response.json();
    console.log("Dashboard data:", data);

    // Return competitions array
    // Return competitions and rewards arrays
    return {
      competitions: Array.isArray(data.competitions) ? data.competitions : [],
      rewards: Array.isArray(data.rewards) ? data.rewards : 
      [] };
      } catch (err) {
        console.error(err);
        alert("❌ Could not load dashboard");
        return { competitions: [], rewards: [] };
      }
    }


// Find competition ID by token, with detailed logging
function getCompetitionIdByToken(competitions, token) {
  console.log("Scanning for token:", token);
  const extractedToken = extractTokenFromQRCode(token);
  for (const comp of competitions) {
    console.log("Checking competition:", comp.title, "Token:", comp.participation?.token);
    
    if (comp.participation?.token === extractedToken) {
      console.log("✅ Token matched:", token, "Competition ID:", comp.id);
      return comp.id;
    }
  }

  console.log("❌ No matching token found for:", token);
  return null;
}

function extractTokenFromQRCode(qrText) {
  // Assumes the token is the part between /competition/ and /join
  const match = qrText.match(/\/competition\/(.+?)\/join/);
  return match ? match[1] : qrText; // fallback to full string
}


// Find reward by token
function getRewardByToken(rewards, token) {
  console.log("Scanning for reward token:", token);
  const extractedToken = extractTokenFromQRCode(token);
  for (const reward of rewards) {
    if (reward.token === extractedToken) {
      console.log("✅ Reward matched:", token, "Points:", reward.points);
      return reward;
    }
  }
  return null;
}



// Register participant
async function registerParticipant(userId, competitionId, scannedCode) {
  try {
    const response = await fetch(`${API_BASE_URL}/api/competition/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId, competitionId, qrCode: scannedCode })
    });

    const data = await response.json();
    console.log("Server response:", data);

    if (response.ok && data.success) {
      alert("✅ Registration successful!");
    } else {
      alert("❌ Registration failed: " + (data.error || "Unknown error"));
    }
  } catch (error) {
    console.error(error);
    alert("❌ Registration failed due to network error.");
  }
}

// Register reward
async function registerReward(userId, reward) {
  try {
    const response = await fetch(`${API_BASE_URL}/api/reward/claim`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId, token: reward.token, points: reward.points })
    });

    const data = await response.json();
    console.log("Reward server response:", data);

    if (response.ok && data.success) {
      alert(`✅ Reward claimed! You earned ${reward.points} points.`);
    } else {
      alert("❌ Reward claim failed: " + (data.error || "Unknown error"));
    }
  } catch (err) {
    console.error(err);
    alert("❌ Reward claim failed due to network error.");
  }
}


// Start scanner
async function startScanner() {
  const competitions = await loadCompetitions();

  const userId = JSON.parse(localStorage.getItem("musAuthUser"))?.id;
  if (!userId) {
    alert("❌ User not logged in!");
    return;
  }

  try {
    const devices = await Html5Qrcode.getCameras();
    if (!devices.length) return alert("No camera detected.");

    await scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      async decodedText => {
        // decodedText is the scanned token
        const competitionId = getCompetitionIdByToken(competitions, decodedText);
        if (!competitionId) {
          alert("❌ Invalid token or competition not found!");
          return;
        }

        scanner.stop(); // stop after first scan
        await registerParticipant(userId, competitionId, decodedText);
      },
      err => console.warn("Scan error:", err)
    );
  } catch (err) {
    if (err.name === 'NotAllowedError') {
      alert("Camera access blocked. Please allow permissions.");
    } else {
      alert("Scanner Error: " + err.message);
    }
  }
}

window.onload = startScanner;
</script>

</body>
</html>
