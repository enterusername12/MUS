<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Murdoch University — Sign In</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="page center">
<div class="card">
<header class="logo-area">
<img src="assets/mulogo.png" alt="Murdoch University" class="logo">
<p class="subtitle">Murdoch University Student Portal</p>
</header>


<nav class="toggle">
<button class="tab active" data-target="signin">Sign In</button>
<button class="tab" data-target="create">Create Account</button>
</nav>


<section class="form-area" id="signin">
<label class="label">I am a
<select id="roleSelect" class="input">
<option>Student</option>
<option>Guest / Visitor</option>
<option>Staff (Admin Only)</option>
<option>Admin (Admin Only)</option>
</select>
</label>


<label class="label">Email Address
<input id="email" type="email" placeholder="your.email@murdoch.edu.au" class="input">
</label>


<label class="label">Password
<div class="password-row">
<input id="password" type="password" placeholder="Enter your password" class="input">
<button id="togglePwd" class="icon-btn" aria-label="Show password">👁️</button>
</div>
</label>


<button id="signInBtn" class="primary-btn">Sign In</button>


<button id="otpFlowBtn" class="ghost-btn"><span class="icon">✉️</span> Sign in with OTP</button>


<p class="help">Need help? <a href="#" id="contactSupport">Contact Support</a></p>
</section>


</div>
</main>


<script src="js/script.js"></script>
</body>
</html>
